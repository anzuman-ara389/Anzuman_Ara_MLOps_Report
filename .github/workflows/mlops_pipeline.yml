name: Customer Churn MLOps Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  run-mlops-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

- name: Initialize database
  run: python -m src.database

- name: Ingest live data
  run: python -m src.live_ingestion

- name: Run preprocessing
  run: python -m src.preprocess

- name: Train model
  run: python -m src.train

- name: Run drift detection
  run: python -m src.drift_detection

- name: Conditional retraining
  run: python -m src.auto_retrain