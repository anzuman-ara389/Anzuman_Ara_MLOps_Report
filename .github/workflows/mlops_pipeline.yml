name: Customer Retention MLOps Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Initialize database
        run: |
          python src/database.py

      - name: Ingest live customer data
        run: |
          python src/live_ingestion.py

      - name: Preprocess data
        run: |
          python src/preprocess.py

      - name: Train model
        run: |
          python src/train.py

      - name: Run drift detection
        run: |
          python src/drift_detection.py

      - name: Run conditional retraining
        run: |
          python src/auto_retrain.py

    
      # AUTO COMMIT & PUSH
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/ artifacts/ logs/

          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update: data + model artifacts"

          git push